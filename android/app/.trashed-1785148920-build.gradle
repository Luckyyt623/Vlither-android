plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

def keystorePropsFile = file("keystore.properties")
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystoreProps.load(new FileInputStream(keystorePropsFile))
}
def secret = { String propKey, String envKey ->
    def v = keystoreProps.getProperty(propKey)
    if (v == null || v.isEmpty()) v = System.getenv(envKey)
    return v ?: ""
}

android {
    namespace 'com.vlither'
    compileSdk 34

    defaultConfig {
        applicationId "com.vlither"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            storeFile     file("vlither.keystore")
            storePassword secret('STORE_PASSWORD', 'STORE_PASSWORD')
            keyAlias      secret('KEY_ALIAS', 'KEY_ALIAS')
            keyPassword   secret('KEY_PASSWORD', 'KEY_PASSWORD')
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
        debug {
            signingConfig signingConfigs.release  // use same key for debug too
        }
    }

    sourceSets {
        main {
            java.srcDirs = ['src/main/kotlin']
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    buildFeatures {
        prefab true
        buildConfig true
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.3.20"
}
