name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Slang shader compiler
        run: |
          SLANG_VERSION="2024.14.3"
          wget -q "https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64.tar.gz" -O slang.tar.gz
          if [ $? -ne 0 ]; then
            echo "ERROR: Failed to download Slang v${SLANG_VERSION}"
            exit 1
          fi
          tar -xzf slang.tar.gz

          SLANG_DIR=$(find . -maxdepth 2 -name slangc -type f | head -1 | xargs dirname)
          SLANG_DIR=$(realpath "$SLANG_DIR")
          echo "Slang dir: $SLANG_DIR"

          printf '#!/bin/sh\nexport LD_LIBRARY_PATH="%s:$LD_LIBRARY_PATH"\nexec "%s/slangc" "$@"\n' "$SLANG_DIR" "$SLANG_DIR" > /tmp/slangc_wrapper.sh
          sudo mv /tmp/slangc_wrapper.sh /usr/local/bin/slangc
          sudo chmod +x /usr/local/bin/slangc

          slangc -v

      - name: Compile shaders
        run: python3 build.py 2

      - name: Copy assets to Android project
        run: |
          ASSETS=android/app/src/main/assets
          mkdir -p "$ASSETS/shaders" "$ASSETS/fonts" "$ASSETS/textures"

          if [ ! -d "app/res/shaders/bin" ]; then
            echo "ERROR: app/res/shaders/bin does not exist. Shader compilation failed."
            exit 1
          fi
          cp app/res/shaders/bin/*.spv "$ASSETS/shaders/"

          [ -d "app/res/fonts"    ] && cp app/res/fonts/*.ttf      "$ASSETS/fonts/"    || true
          [ -d "app/res/textures" ] && cp -r app/res/textures/. "$ASSETS/textures/" || true

          echo "Assets copied:"
          find "$ASSETS" -type f

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.6
          chmod +x gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug -Pandroid.ndkVersion=26.3.11579264 --stacktrace

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease -Pandroid.ndkVersion=26.3.11579264 --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vlither-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: vlither-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
